name: Releases

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      MAVEN_PUBLISHING_URL: https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/
      CENTRAL_NAMESPACE: ${{ vars.CENTRAL_NAMESPACE }}
      MAVEN_GROUP: ${{ vars.MAVEN_GROUP }}
      MAVEN_ARTIFACT_ID: ${{ vars.MAVEN_ARTIFACT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6
        name: Set up Gradle
      - name: Add permission
        run: chmod +x ./gradlew
      - name: Set release version
        run: |
          RELEASE_VERSION="${RELEASE_TAG#v}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release version: ${RELEASE_VERSION}"
      - name: Execute Gradle build
        run: ./gradlew build -Pmod_version="${RELEASE_VERSION}"
      - name: Publish to Maven Central staging
        run: |
          : "${CENTRAL_USERNAME:?Missing secret CENTRAL_USERNAME}"
          : "${CENTRAL_PASSWORD:?Missing secret CENTRAL_PASSWORD}"
          : "${GPG_SIGNING_KEY:?Missing secret GPG_SIGNING_KEY}"
          : "${CENTRAL_NAMESPACE:?Missing repository variable CENTRAL_NAMESPACE}"
          MAVEN_GROUP="${MAVEN_GROUP:-$CENTRAL_NAMESPACE}"
          MAVEN_ARTIFACT_ID="${MAVEN_ARTIFACT_ID:-mekeng}"

          ./gradlew --build-cache --info --stacktrace \
            -Ppublish_to_maven=true \
            -Pmaven_name=centralPortal \
            -Pmaven_url="${MAVEN_PUBLISHING_URL}" \
            -Pmaven_group="${MAVEN_GROUP}" \
            -Pmaven_artifact_id="${MAVEN_ARTIFACT_ID}" \
            -Pmod_version="${RELEASE_VERSION}" \
            -Pgenerate_sources_jar=true \
            -Pgenerate_javadocs_jar=true \
            -PsigningInMemoryKeyPassword="${GPG_SIGNING_PASSWORD:-}" \
            publish -x test
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_centralPortalUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_centralPortalPassword: ${{ secrets.CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
      - name: Upload staged repository to Central Portal
        run: |
          : "${CENTRAL_NAMESPACE:?Missing repository variable CENTRAL_NAMESPACE}"
          auth="$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 -w 0)"
          curl --fail-with-body --show-error --silent --request POST \
            --header "Authorization: Bearer ${auth}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/${CENTRAL_NAMESPACE}?publishing_type=automatic"
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
      - name: Create GitHub release
        run: gh release create "$RELEASE_TAG" build/libs/* --title "$RELEASE_TAG" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
